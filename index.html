<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <title>Stable Gallery - Anti-Shake Version</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #video-ui { 
            position: absolute; top: 20px; left: 20px; z-index: 1000; 
            width: 200px; border: 2px solid #00ffff; border-radius: 12px; overflow: hidden;
            box-shadow: 0 0 10px rgba(0,255,255,0.5);
        }
        #video { width: 100%; transform: scaleX(-1); background: #111; display: block; }
        #status-msg { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 100; background: rgba(0,0,0,0.8); color: #00ffff; padding: 10px 25px; 
            border-radius: 30px; border: 1px solid #00ffff; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="video-ui">
        <video id="video" autoplay playsinline></video>
    </div>

    <div id="status-msg">ТОГТВОРЖУУЛАЛТ ИДЭВХЖИВ...</div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const MY_IMAGES = [
            { main: 'Screenshot 2026-04-14 095925.png' },
            { main: '2.jpg' }, { main: '24.jpg' }, { main: '3.jpg' }, 
            { main: '4.jpg' }, { main: '5.jpg' }, { main: '6.jpg' },
            { main: '7.jpg' }, { main: '8.jpg' }, { main: '9.jpg' },
            { main: '10.jpg' },
        ];

        let scene, camera, renderer, galleryGroup;
        let currentIdx = 0;
        let targetX = 0;
        let isCooldown = false;

        // --- ТОГТВОРЖУУЛАХ ХУВЬСАГЧУУД ---
        let targetZoom = 1.0;
        let smoothedZoom = 1.0;
        let targetPanY = 0;
        let smoothedPanY = 0;
        let initialHandDist = null;
        
        const LERP_FACTOR = 0.05; // Энэ тоо бага байх тусам чичиргээ багасна (0.01 - 0.1 хооронд)

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            galleryGroup = new THREE.Group();
            scene.add(galleryGroup);

            const loader = new THREE.TextureLoader();
            MY_IMAGES.forEach((data, i) => {
                loader.load(data.main, (tex) => {
                    const aspect = tex.image.width / tex.image.height;
                    const geometry = new THREE.PlaneGeometry(12 * aspect, 12);
                    const material = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: i === 0 ? 1 : 0.1 });
                    const mesh = new THREE.Mesh(geometry, material);
                    const group = new THREE.Group();
                    group.position.x = i * 35;
                    group.add(mesh);
                    galleryGroup.add(group);
                });
            });
            animate();
        }

        function onResults(results) {
            const msg = document.getElementById('status-msg');
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                initialHandDist = null;
                return;
            }

            const lm = results.multiHandLandmarks[0];
            const wrist = lm[0];
            const palm = lm[9];

            // 1. ШИЛЖИХ ЛОГИК (Гүйлгэх)
            if (!isCooldown) {
                if (wrist.x < 0.15 && currentIdx < MY_IMAGES.length - 1) {
                    currentIdx++; triggerMove();
                } else if (wrist.x > 0.85 && currentIdx > 0) {
                    currentIdx--; triggerMove();
                }
            }

            // 2. ZOOM ЛОГИК (Smoothing-тэй)
            const thumb = lm[4];
            const index = lm[8];
            const dist = Math.hypot(thumb.x - index.x, thumb.y - index.y);

            if (initialHandDist === null) {
                initialHandDist = dist;
            } else {
                let ratio = dist / initialHandDist;
                // Бага зэргийн чичиргээг үл тоомсорлох (Deadzone)
                if (Math.abs(1 - ratio) > 0.02) { 
                    targetZoom *= ratio;
                    targetZoom = THREE.MathUtils.clamp(targetZoom, 1.0, 5.0);
                    initialHandDist = dist;
                }
            }

            // 3. PAN ЛОГИК (Дээш доош гүйлгэх - Smoothing-тэй)
            if (targetZoom > 1.2) {
                // Алганы Y байрлалыг ашиглан чиглүүлэх
                targetPanY = (0.5 - palm.y) * (targetZoom * 8);
            } else {
                targetPanY = 0;
            }

            msg.innerText = `СЛАЙД ${currentIdx + 1} | ZOOM: ${smoothedZoom.toFixed(1)}x`;
        }

        function triggerMove() {
            targetX = -currentIdx * 35;
            targetZoom = 1.0;
            targetPanY = 0;
            isCooldown = true;
            setTimeout(() => isCooldown = false, 1200);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Гүйлгэх хөдөлгөөн (Зөөлөн)
            galleryGroup.position.x = THREE.MathUtils.lerp(galleryGroup.position.x, targetX, 0.1);

            // Чичиргээг шүүх (Exponential Smoothing)
            smoothedZoom = THREE.MathUtils.lerp(smoothedZoom, targetZoom, LERP_FACTOR);
            smoothedPanY = THREE.MathUtils.lerp(smoothedPanY, targetPanY, LERP_FACTOR);

            galleryGroup.children.forEach((group, i) => {
                const mesh = group.children[0];
                if (i === currentIdx) {
                    mesh.material.opacity = THREE.MathUtils.lerp(mesh.material.opacity, 1, 0.1);
                    group.scale.set(smoothedZoom, smoothedZoom, 1);
                    group.position.y = smoothedPanY;
                } else {
                    mesh.material.opacity = THREE.MathUtils.lerp(mesh.material.opacity, 0.1, 0.1);
                    group.position.y = THREE.MathUtils.lerp(group.position.y, 0, 0.1);
                }
            });

            renderer.render(scene, camera);
        }

        // Setup
        const videoElement = document.getElementById('video');
        init();
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
        hands.onResults(onResults);
        new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 640, height: 480 }).start();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
